name: CI

# Runs the verification gates from CONTRIBUTING.md on every PR and on pushes to
# main. The backend recall gate (tests/analysis/) is a REQUIRED status check:
# the project's top rule is "never miss a real attack", and it was previously
# enforced only by convention (contributors running pytest by hand).
on:
  pull_request:
  push:
    branches: [main]

# Every job here only checks out code and runs tests, so the GITHUB_TOKEN
# never needs more than read access (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Formatting, lint, and type checks are enforced for both Python trees from
    # one job so a drifted tree can never merge. Pre-existing ruff findings
    # accepted at gate-introduction time are grandfathered via per-file-ignores
    # burn-down blocks in each pyproject; new code is held to the full rule set.
    # mypy runs at a lenient baseline with a growing strict-module cohort.
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync
      - name: Backend format check
        run: uv run ruff format --check backend
      - name: Backend lint
        run: uv run ruff check backend
      - name: Backend type check
        run: uv run mypy backend/app
      - name: Sidecar sync
        working-directory: services/clustering/backend
        run: uv sync --extra dev
      - name: Sidecar format check
        working-directory: services/clustering/backend
        run: uv run ruff format --check .
      - name: Sidecar lint
        working-directory: services/clustering/backend
        run: uv run ruff check .
      - name: Sidecar type check
        working-directory: services/clustering/backend
        run: uv run mypy app

  backend:
    name: Backend (pytest + recall gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync
      - name: Recall gate (attack-must-fire tests)
        # Run first and on its own so a recall regression is unambiguous.
        working-directory: backend
        run: uv run pytest tests/analysis/ -q
      - name: Full backend suite
        working-directory: backend
        run: uv run pytest tests/ -q

  live-db:
    # The hermetic suite mocks every CH/PG call, which has let ClickHouse
    # 26.x runtime regressions (alias shadowing, projection-gate DDL) ship
    # with green tests. This job applies the real schema and runs the
    # tests/live_db/ tier against service containers pinned to the SAME
    # image versions as docker-compose.yml; bump all three together
    # (docker-compose.yml, this job, .github/workflows/perf.yml). The tier
    # is env-gated (TMS_LIVE_DB_TESTS=1), so plain `pytest tests/` stays
    # hermetic for contributors without Docker.
    name: Live-DB tier (ClickHouse 26.x + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: tms_user
          POSTGRES_PASSWORD: tms_password
          POSTGRES_DB: tms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tms_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:26.1.3
        env:
          CLICKHOUSE_DB: tms_analytics
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync
      - name: Live-DB tests (migrations + representative queries)
        working-directory: backend
        env:
          TMS_LIVE_DB_TESTS: "1"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: tms_user
          POSTGRES_PASSWORD: tms_password
          POSTGRES_DB: tms_db
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "9000"
        run: uv run pytest tests/live_db/ -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Match the project's pnpm: frontend/pnpm-workspace.yaml uses the
          # `allowBuilds` field (pnpm >= 10.4), which pnpm 9 rejects with
          # "packages field missing or empty".
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Unit tests
        working-directory: frontend
        run: pnpm test
      - name: Type-check + build
        working-directory: frontend
        run: pnpm build

  clustering-sidecar:
    name: Clustering sidecar (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Sync dev dependencies
        working-directory: services/clustering/backend
        run: uv sync --extra dev
      - name: Test
        working-directory: services/clustering/backend
        run: uv run pytest -q
