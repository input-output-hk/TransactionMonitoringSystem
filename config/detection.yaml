# Detection scorer configuration. This file is tracked in git — changes to
# weights, anchors, allowlists, and band caps are reviewed like any other
# code change. Edit freely and commit alongside the scorer change it supports.
#
# Anchor convention: `{p50, p99}` maps to the normalisation bounds used by
# `normalise()` / `normalise_inverted()`. Values below p50 normalise to 0
# (or 1 when inverted); values above p99 normalise to 1 (or 0 when inverted).
#
# Bootstrap anchors are used only when the per-script / global baseline in
# ClickHouse has fewer than BASELINE_MIN_SAMPLES rows. Real baselines, once
# populated, supersede bootstraps automatically.

# Cardano ledger protocol parameters (mainnet and preprod share these values
# as of the Conway era, 2026). Sourced from the on-chain protocol parameters
# (cardano.org parameter guide). Detection thresholds that encode a resource-
# exhaustion threat model reference these named limits rather than repeating
# the raw byte counts, so a single edit propagates and there are no magic
# numbers buried in scorer code.
protocol_limits:
  max_value_size_bytes: 5000    # maxValueSize: per-output serialized Value CBOR cap
  max_tx_size_bytes: 16384      # maxTxSize: per-transaction serialized size cap

# Cross-class corroboration signal. The risk band is driven solely by the
# single highest class score (max_score), so a transaction that independently
# trips two different attack detectors is banded the same as one that trips
# only the strongest. That agreement is itself evidence worth surfacing. This
# block does NOT change the band or alerting; it only records how many distinct
# classes scored at or above corroboration_threshold, so multi-signal
# transactions are filterable for analyst review (API: min_corroboration).
# threshold tuned to 40 so a class must be a real partial signal (top of
# Informational / into Moderate), not noise.
composite_corroboration:
  corroboration_threshold: 40.0

# Baseline-resolution tunables shared by every percentile-baselined scorer
# (consumed by normalise.py / scorer_config.py, not by a single scorer).
baselines:
  # A per-script (or per-policy) baseline with near-zero spread between p50
  # and p99 collapses the inverted-normalise axis onto p50: any value at the
  # median scores 1.0 and looks maximally suspicious. The strict-equality
  # case (p99 == p50) is handled inside normalise(); baselines with a tiny
  # positive spread (e.g. p50=2.52M, p99=2.59M; 2.7% of p50) still saturate
  # every normal interaction. A baseline whose spread is below this fraction
  # of p50 is treated as uninformative and resolution falls through to the
  # next tier (global / bootstrap).
  min_spread_ratio: 0.10
  # Cap on a LEARNED (per-script / per-policy / global) baseline's p99
  # relative to the scorer's bootstrap anchor p99; 0 disables. The resolved
  # p99 is the normalisation saturation point, so an attacker who pre-trains
  # a wide per-script distribution (~200 outputs over the 90-day window,
  # roughly tens of ADA in fees) could otherwise push p99 arbitrarily high
  # and have a real attack normalise to ~0. With the cap, an established
  # contract may legitimately run up to K times the protocol-grounded anchor
  # but never so far that the anchor's threat model becomes unreachable.
  per_script_p99_cap_multiplier: 5.0
  # Drift guard on baseline recomputes. A new p99 differing from the stored
  # one by more than p99_threshold (relative) is HELD: the prior baseline
  # stays active and the rejected candidate is logged to
  # baseline_drift_events for analyst review. Poisoning a per-script
  # baseline now requires moving p99 slowly under the threshold, leaving a
  # multi-day trail, instead of one wide-distribution dump.
  drift:
    enabled: true
    p99_threshold: 0.50

scorers:

  # ------------------------------------------------------------------
  multiple_sat:
    weights:
      # 'extraction' is now value-agnostic: max(s_extraction_lov, s_extraction_assets).
      # Same weight as before so existing scores for lovelace-extraction txs are
      # preserved; the asset axis closes the NFT-marketplace blind spot.
      extraction: 0.42     # max(net_value_out_of_script, n_assets_out_of_script)
      exunits_inv: 0.28    # exunits_per_script_input, inverted
      inputs: 0.16         # n_inputs_same_script
      recurrence: 0.14     # sender_recurrence
    # Headroom multiplier applied to the upper anchor of the VALUE-extraction
    # axis (net_value / n_assets) when, and only when, a PER-SCRIPT baseline is
    # used. The extraction features are discrete and low-cardinality, so a
    # per-script p99 often sits ~1 above p50 (e.g. n_assets p50=2, p99=3);
    # normalise() then saturates on the contract's COMMON upper-normal value
    # (a 3-asset spend), flagging routine activity. Widening the saturation
    # point to p50 + (p99-p50)*headroom means only extraction well above the
    # contract's own normal range scores, while rare/novel scripts on the
    # conservative bootstrap anchor are unaffected (preserving CTF-01-class
    # recall). Tune against the per-script extraction distribution; raise to be
    # more permissive on established contracts, lower to alert sooner.
    per_script_extraction_headroom: 3.0
    bootstrap_anchors:
      net_value_out_of_script:  { p50: 5_000_000,   p99: 500_000_000 }
      # Distinct native-asset (policy, name) pairs net-leaving the script.
      # Most multi-input script txs touch 0 assets; NFT-marketplace double-sat
      # exploits (canonical case) extract 2+. p50=0 so any extraction
      # registers; p99=2 so the canonical 2-NFT exploit reaches the ceiling.
      # Per-script baselines override this for legitimate NFT-batchers once
      # enough samples accumulate.
      n_assets_out_of_script:   { p50: 0,           p99: 2 }
      exunits_per_script_input: { p50: 100_000,     p99: 10_000_000 }
      n_inputs_same_script:     { p50: 2,           p99: 10 }
      sender_recurrence:        { p50: 0,           p99: 1 }
    # Network-scoped to prevent a preprod entry from accidentally suppressing
    # mainnet alerts (or vice versa). Each leaf is a list of address prefixes
    # for known batch validators on that network. Missing networks default to
    # an empty list at the scorer.
    allowlist_prefixes:
      mainnet:
        - "addr1w9zsmyfc5tg49ng9gqaetm8qheyheemxakq47x7qfwnq5wq"  # SundaeSwap v3 batch
        - "addr1z8snz7c4974vzdpxu65ruphl3zjdvtxw8strf2c2tmqnxz"   # Minswap v2 batch
        - "addr1wyx22z2s4kasd3w976pnjf9xdty88epjqfvgkmfnfpcsgh"   # WingRiders batch
      # Preprod-only seeded entries. Lower attribution bar than mainnet
      # because preprod is a sandbox, BUT script addresses (unlike policy
      # IDs) are hashes of validator bytecode + parameters: an attacker
      # cannot reproduce the same address without controlling the original
      # validator source. The "permissionless preprod" risk surface is
      # therefore narrower here than for token_dust.allowlist_policies.
      # Re-evaluate once per-script baselines on this address mature.
      preprod:
        # Operator-controlled state-machine contract observed running
        # periodic claim operations (2 inputs -> 2 outputs, 1 returning to
        # script with state, 1 to operator wallet) at ~248 H+Critical
        # alerts/week across the 2026-05-12 to 2026-05-15 window. Same
        # operator also runs UTxO-consolidation sweeps from the same script
        # (uniform_sweep_guard already covers those). 642 total interactions
        # in 7 days, all flowing to two known operator wallets. Not under
        # attack; the contract's normal operation produces the
        # lazy-validator floor signature because its validator is small
        # (~535k CPU/input, below the bootstrap p99=10M).
        #
        # REVIEW BY: 2026-08-12 (or sooner if `baselines` table accumulates
        # >= 500 per_script samples for this address on preprod, which
        # would let the natural per-script normalisation handle this
        # cluster without an explicit allowlist entry).
        - "addr_test1wzpzd7k0lkpkr3kh460ll6c88r4p5nhqehu3gjtc359a2ds9qpd7c"
      preview: []
    reason_threshold: 0.5
    # Band floor for "lazy validator" structural confirmation: when the gate
    # has fired (≥2 same-script inputs + spend redeemer) AND s_exunits_inv
    # exceeds the threshold (validator did near-zero CPU per input), elevate
    # the score to at least the floor so the band lands at High. Mirrors the
    # mechanism front_running uses in reverse (front_running caps down with
    # high_band_cap; here we floor up). Allowlisted scripts are exempt.
    lazy_validator_threshold: 0.8
    lazy_validator_floor: 60.0
    # Extraction sanity gate on the floor. Double-satisfaction by definition
    # requires value to leave the script (lovelace or native assets); a
    # state-machine contract that consumes 2 of its own UTxOs and writes
    # state back has ``s_extraction = 0`` and is not an exploit even with
    # cheap execution. The scorer applies the floor only when
    # ``s_extraction > lazy_validator_extraction_min``. Default 0.0 means
    # "strict positivity": any non-zero lovelace OR asset extraction passes.
    # Raise toward CTF 05's small-drain signal (~0.02 on the lovelace axis,
    # ~0.5 on the asset axis) only if state-machine contracts with trace
    # extraction (e.g. ledger rounding) keep tripping High.
    lazy_validator_extraction_min: 0.0
    # Uniform-sweep guard. A tx that consumes many inputs from a single
    # script with identical spend redeemers and writes no value back to
    # that script is structurally a UTxO consolidation (owner sweeping
    # their own faucet/airdrop drop on preprod, batch redemptions on
    # mainnet), not double-satisfaction. When this shape is detected the
    # lazy_validator_floor is suppressed for the affected group: the gate
    # may still fire and the weighted score is computed normally, but the
    # structural floor does not lift benign sweeps into the High band.
    # Allowlisted scripts take the existing reweight path before this
    # check and are unaffected.
    uniform_sweep_guard:
      enabled: true
      require_uniform_redeemer: true      # all spend redeemer payloads identical
      require_no_script_return: true      # no output back to the same payment cred
      min_inputs: 10                      # only kick in above this input count
    # Extraction-magnitude escape hatch on the two benign-shape suppressions
    # (uniform sweep, value-returned state continuation). Both shapes are
    # attacker-reachable: returning 1 lovelace to the script forces the
    # state-continuation suppression, and a >= min_inputs identical-redeemer
    # full drain matches the sweep fingerprint exactly. When the UN-WIDENED
    # extraction floor signal (s_extraction_floor, raw per-script/bootstrap
    # anchors, so the per-script headroom cannot weaken it) exceeds
    # extraction_floor_min, the shape is no longer confidently benign: the
    # finding is kept and capped at the top of Moderate instead of silenced
    # to no-finding. The benign populations the suppressions were built for
    # sit far below the threshold: a state machine returning value scores
    # ~0 on extraction, and the observed small owner-sweeps ~0.002 on the
    # lovelace axis. 0.5 leaves them suppressed while any multi-asset drain
    # (asset axis saturates at 1.0 with >2 net assets out) or a lovelace
    # drain above ~half the bootstrap p99 surfaces for review. Recall-first:
    # a Moderate false positive on a large owner-sweep is strictly better
    # than a silenced real drain.
    suppression_escape:
      enabled: true
      extraction_floor_min: 0.5

  # ------------------------------------------------------------------
  large_datum:
    # Gate: a script datum is a bloat-DoS candidate only when it is BOTH large
    # (>= min_datum_bytes) AND low-information (Shannon entropy of its bytes
    # <= bloat_entropy_max bits/byte). Absolute size alone cannot separate a
    # real attack from benign state: an observed CTF datum-bloat attack carries
    # a 7.3 KB datum, overlapping a benign protocol contract's ~6.9 KB datum.
    # The discriminator is content entropy: a bloat attack pads with repetitive
    # bytes (observed ~0.3-1.5 bits/byte) to inflate size cheaply, while a
    # legitimate large datum holds structured state (~7 bits/byte). The 4.0
    # threshold sits in the wide empty gap between the two populations.
    # Limitation: random high-entropy padding would evade this; per-script
    # size baselines / recurrence are the complementary defence (deferred).
    gate:
      min_datum_bytes: 6000
      bloat_entropy_max: 4.0
      # Structural bloat trigger, OR-ed with the entropy gate. A datum-bloat
      # attack concentrates its bytes in one oversized CBOR leaf (a giant
      # ByteArray): largest-leaf / total-datum-bytes near 1.0. Legitimate large
      # PlutusData spreads bytes across many small nested leaves (observed
      # ~0.005). Unlike entropy this is structural, so it catches a single leaf
      # padded with RANDOM (high-entropy) bytes, the evasion the entropy gate
      # misses. Observed gap is wide (attack 0.96 vs legit 0.005); 0.5 sits
      # safely between. Does NOT separate a flat list of many distinct
      # high-entropy elements from a legitimate registry; that needs provenance.
      leaf_concentration_max: 0.5
      # Absolute-size backstop. A datum at this fraction of
      # protocol_limits.max_tx_size_bytes (0.75 * 16384 = 12288 bytes) is
      # flagged unconditionally, IGNORING entropy: once the datum plus a minimal
      # consuming tx's inputs/outputs/redeemers/witnesses approaches the 16384
      # tx-size ceiling, the UTxO cannot be spent regardless of what the padding
      # bytes are. This catches a high-entropy (random-padded) bloat attack that
      # would otherwise evade the entropy gate. Sits above the observed
      # legitimate maximum (benign per-script p99 ~7.4 KB) with margin. Lower it
      # to catch more high-entropy bloat, at the cost of false positives on
      # large legitimate datums. Mid-range (6-12 KB) high-entropy datums that
      # overlap legitimate state remain a known gap (needs recurrence/semantics).
      size_backstop_fraction: 0.75
      # Observability flag for datumHash-only outputs at script addresses.
      # The referenced datum cannot be sized without an indexer, so a
      # bloat-by-hash attack is invisible to the byte gates above. When on,
      # the scorer engages and records datum_hash_only_count in sub_scores
      # plus the addresses in evidence; the result stays a no-finding (-1)
      # and never alerts. Kill switch only.
      flag_datum_hash_only: true
    # Observability-only engagement threshold for the multi-output
    # datum-bloat shape (an attacker splits the bloat payload across N
    # script-address outputs of the same contract, each individually
    # below `min_datum_bytes`). When the SUM of datum bytes across
    # outputs at the same payment credential reaches this value, the
    # scorer engages without producing an alert: the per-output
    # predicate still drives `max_score` and band, but
    # `max_script_datum_bytes` is recorded in `sub_scores` for analyst
    # queries. Set well above `min_datum_bytes` so the engagement is
    # meaningful (sum of 2x 3KB doesn't engage; 4x 3KB does).
    aggregate_engagement_min: 12000
    weights:
      # The entropy gate (above) is what removes the false positives, so the
      # score axes can keep their original shape: a confirmed bloat datum is
      # both large (datum_bytes) and occupies most of the UTxO (datum_ratio).
      # Both saturate for a genuine padding attack, driving it to Critical.
      datum_bytes: 0.50
      datum_ratio: 0.35
      value_cbor_inv: 0.05
      recurrence: 0.10      # stubbed to 0 in code (entity clustering deferred)
    fixed_anchors:
      datum_ratio: { p50: 0.70, p99: 0.97 }
    bootstrap_anchors:
      datum_bytes:      { p50: 500, p99: 14000 }
      value_cbor_bytes: { p50: 100, p99: 1500 }
    reason_threshold: 0.5

  # ------------------------------------------------------------------
  token_dust:
    gate:
      # Minimum live asset classes in a single script-address output before
      # the scorer engages. A single-NFT UTxO cannot bloat Value-field CBOR
      # enough to be a dust attack, and per-script baselines with p99=1 (all
      # outputs carry 0-1 assets) saturate the assets axis on any NFT deposit.
      # Set to 2 to require a real bundle. Raise if false positives persist.
      min_token_count: 2
    # Engagement discriminator. A bundle only enters scoring when it is a
    # plausible value-bloat DoS: either it carries >= dos_asset_min distinct
    # (policy, name) pairs, OR its serialized Value CBOR reaches
    # dos_value_cbor_fraction of protocol_limits.max_value_size_bytes (5000).
    # The byte branch is what makes the gate robust to the long-asset-name
    # evasion (few pairs, long names => high CBOR). Normal protocol multi-asset
    # UTxOs (2-6 pairs) sit at <=0.5 KB of Value CBOR and well under both
    # thresholds, so they produce no finding at all (not even Low). At 0.20 the
    # byte floor is 1000 bytes: observed benign bundles on preprod top out at
    # ~0.5 KB, genuine high-pair DoS at ~1.9-2.5 KB.
    dos_value_cbor_fraction: 0.20
    weights:
      bytes: 0.35
      assets: 0.35
      ada_inv: 0.15
      recurrence: 0.15
    bootstrap_anchors:
      value_cbor_bytes:    { p50: 100,       p99: 1500 }
      unique_token_count:  { p50: 1,         p99: 20 }
      ada_amount:          { p50: 1_200_000, p99: 2_000_000 }
    # Allowlists for known multi-asset protocol UTxOs. Lending markets
    # (Lenfi/Aada) and similar protocols naturally co-locate offer-NFTs,
    # reference-NFTs and lent-token batches at min-UTxO ADA on every active
    # position; the value-bloat shape is identical to a DoS bundle and
    # without an allowlist the scorer fires on normal protocol use.
    #
    # A UTxO is skipped when its address starts with an allowlisted prefix
    # for its network OR every non-ADA asset it carries is under an
    # allowlisted policy for its network.
    #
    # Both blocks are network-scoped: a preprod policy ID can only be
    # registered on preprod (permissionless), so allowing one globally
    # would let an attacker reuse the same hash on mainnet to bypass
    # detection. Address prefixes are network-scoped for the same reason
    # and because preprod and mainnet use different bech32 HRPs anyway.
    #
    # Entries must be tied to a verified protocol before commit. The
    # 2026-05-15 preprod cluster surfaced four candidate policies
    # (`31f830c2…`, `def68337…`, `186e32fa…`, `65ba60a6…`); these are
    # deliberately not seeded here pending protocol attribution.
    allowlist_prefixes:
      mainnet: []
      preprod: []
      preview: []
    # Structural discriminator between real value-bloat DoS and protocol
    # multi-asset UTxOs. Real DoS exploits force the contract to carry
    # forward many distinct (policy, name) pairs, bloating tx CBOR every
    # time anyone interacts with the UTxO. Protocol multi-asset UTxOs
    # bundle a small number of pairs by design (Lenfi loan offer: ~4
    # pairs across 3 policies; Minswap pool: ~4 pairs across 4 policies).
    # Real DoS shapes sit at 15+ distinct pairs; observed protocol
    # shapes on preprod sit at <=6.
    #
    # The total-pairs metric is robust to both CTF 06 shape (80 names
    # under one policy, e.g. minting via a one-shot policy) and the
    # symmetric shape (80 policies x 1 name each, e.g. multiple one-shot
    # mints). Both add ~equivalent CBOR overhead; gating on total pairs
    # catches both.
    #
    # `dos_asset_min` controls two effects:
    #   1. The composite `script_value_bloat_dos` reason fires only when
    #      the bundle has at least this many distinct pairs AND the three
    #      primary sub-scores all saturate.
    #   2. Outputs below this threshold are capped at the top of Moderate
    #      (BAND_HIGH_THRESHOLD - 1). The three saturated sub-scores
    #      still record severity in their own right, but the band
    #      reflects the structural fact that a small bundle cannot
    #      meaningfully bloat the 16KB tx CBOR limit.
    #
    # Defaults: 15 pairs add roughly 400-700 bytes of CBOR overhead,
    # the lower edge of "meaningful fraction of the 16KB tx limit".
    # Below this, the contract carry-forward cost is negligible.
    dos_asset_min: 15
    allowlist_policies:
      # Empty by design. The `dos_asset_min` structural discriminator
      # (above) caps low-asset-count bundles at the top of Moderate
      # regardless of policy, so per-policy suppression is not needed for
      # protocol multi-asset shapes (Lenfi/Aada loan offers, DEX pool
      # state, etc.). Populate only when a verified protocol's UTxOs
      # carry >= dos_asset_min distinct pairs AND require explicit
      # whitelisting; this should be rare.
      mainnet: []
      preprod: []
      preview: []
    reason_threshold: 0.5

  # ------------------------------------------------------------------
  large_value:
    weights:
      # digits is the only reliable signal for this attack class. A simple
      # single-token UTxO has naturally low value_cbor_bytes regardless of
      # quantity, so the 'bytes' axis only fires for multi-asset outputs.
      # Heavier weight on 'digits' lets a max-quantity (near int64) attack
      # reach High/Critical even without the cbor signal.
      digits: 0.55
      bytes: 0.20
      ada_inv: 0.15
      recurrence: 0.10
    bootstrap_anchors:
      # Normal Cardano native-token supplies span 10^6 to 10^15 (7-16 digits).
      # int64 max is ~9.22 * 10^18 (19 digits), the ledger hard ceiling.
      # p50 sits at 13 so typical memecoin supplies (10^12-10^13) contribute
      # weakly but 15+ digit outliers register meaningfully; p99 at int64
      # max so bloat attacks reach the digits ceiling.
      quantity_digits:   { p50: 13,        p99: 19 }
      value_cbor_bytes:  { p50: 100,       p99: 1500 }
      ada_amount:        { p50: 1_200_000, p99: 2_000_000 }
    reason_threshold: 0.5
    # Digits is the only reliable signal for this class (see weights). When the
    # quantity-digits sub-score is at or below this floor the quantity is at or
    # below the median normal supply (p50 = 13 digits, ~10^13), i.e. not a
    # large-quantity outlier; the score is then capped at the top of the
    # Informational band so the
    # secondary axes (inverted-ADA, value-CBOR) cannot alone push a normal
    # min-ADA token UTxO into Moderate. A genuine overflow toward the 19-digit
    # int64 ceiling has a high digits sub-score and is unaffected. Set just
    # above 0 so any above-median supply (>= 14 digits) still scores normally.
    min_digits_subscore: 0.05

  # ------------------------------------------------------------------
  front_running:
    weights:
      outcome: 0.35
      delta: 0.30
      recurrence: 0.25
      structure: 0.10
    fixed_anchors:
      # Reciprocal of mempool delta in ms. p50=1/2000, p99=1/200.
      mempool_delta_inv: { p50: 0.0005, p99: 0.005 }
      fee_delta:         { p50: 500,    p99: 5000 }
      ttl_delta:         { p50: 10,     p99: 100 }
    bootstrap_anchors:
      attacker_recurrence: { p50: 0, p99: 5 }
    outcome_scores:
      TX_B_CONFIRMED: 1.0
      TX1_FAILS_UTXO_SPENT: 1.0
      BOTH_PENDING: 0.5
      TX_A_CONFIRMED: 0.0
      TX1_WINS: 0.0
      TX2_WINS: 0.3
    reason_thresholds:
      outcome: 0.8
      delta: 0.5
      recurrence: 0.5
    min_recurrence_wins: 3       # tx below this count capped at High band
    high_band_cap: 79.0          # score cap when recurrence is insufficient
    delta_ms_default: 10000      # fallback when collision missing delta_ms

  # ------------------------------------------------------------------
  sandwich:
    weights:
      link: 0.30
      rate: 0.30
      impact: 0.20
      profit: 0.10
      recurrence: 0.10
    fixed_anchors:
      rate_delta: { p50: 0.0, p99: 0.15 }
    bootstrap_anchors:
      price_impact:        { p50: 0.0, p99: 0.05 }
      swap_profit:         { p50: 0,   p99: 5_000_000 }
      attacker_recurrence: { p50: 0,   p99: 5 }
    window_slots: 5              # gate: structural triplet must fit within N slots
    # Cap on neighbour rows fetched around a victim tx during structural
    # detection. Bounds the per-tx query cost; a window busier than this is
    # batcher traffic, not a 3-leg sandwich.
    neighbor_limit: 20
    link_scores:
      linked: 1.0                # attacker_linked flag present
      unlinked: 0.2              # triplet present but no linkage evidence
    # Below this attacker net-ADA profit the candidate is suppressed entirely
    # (score -1, no finding), not merely band-capped: a sandwich that extracts
    # no value is not an attack. Net profit is computed in dex.py from the
    # attacker wallet's input/output ADA across the front and back legs. The
    # detector also requires the attacker cluster to be a non-script (wallet)
    # address, which excludes pool/batcher self-interaction (the dominant
    # structural false positive). Blind spot: a sandwich whose profit is in a
    # non-ADA token nets ~0 ADA and is missed; price-impact confirmation needs
    # DEX datum parsing and is out of scope.
    min_profit_lovelace: 200_000
    reason_thresholds:
      link: 0.8
      rate: 0.5
      impact: 0.5

  # ------------------------------------------------------------------
  circular:
    weights:
      amount: 0.30
      recurrence: 0.30
      entropy: 0.20
      auxiliary: 0.10
      speed: 0.10
    fixed_anchors:
      amount_sim:    { p50: 0.70, p99: 0.97 }
      entropy:       { p50: 0.80, p99: 0.30 }   # inverted by design: lower entropy = higher score
      hop_delta_inv: { p50: 0.05, p99: 0.5 }    # 1/20, 1/2
      temporal:      { p50: 0.30, p99: 0.85 }
    bootstrap_anchors:
      attacker_recurrence: { p50: 0, p99: 5 }
    cycle:
      # Minimum cycle hop count to alert. A 2-hop "cycle" is a round-trip
      # (A -> script -> A): a deposit/withdraw or swap-and-change, not circular
      # layering. Real laundering moves value through >= 3 distinct hops to
      # obscure it, so 2-hop round-trips (the dominant false positive) are not
      # alerted. The detector still finds them; the gate filters them out.
      min_length: 3                     # gate: minimum cycle hop count
      max_length: 6                     # gate: maximum cycle hop count
      fee_tolerance_multiplier: 4.0     # max allowed net_loss / expected_fee at gate
      fee_tolerance_strict: 2.0         # above which score is capped at moderate_cap
      per_hop_fee_estimate: 0.02        # 2% per hop for expected_fee heuristic
      max_age_slots: 86400              # forward BFS horizon (Cardano ~1 slot/sec => 24h)
      max_output_fanout: 20             # skip cycle scoring for txs with > N distinct
                                        # output addresses (very unlikely to be circular)
    reason_threshold: 0.5
    moderate_cap: 59.0                  # top of Moderate band
    # Floor on the sum of corroborating signals (entropy + auxiliary + speed).
    # Structural-only matches (just amount_similarity + recurrence) score ~60
    # under the weighted average alone, which would tip a plain
    # A→script→A interaction into High. Require at least this much signal
    # from the corroborating axes; otherwise cap at Moderate. Loosen if real
    # layering attacks with very thin temporal/entropy signals are missed.
    structural_corroboration_floor: 0.1
    recurrence_window_days: 30          # lookback for origin-recurrence count

  # ------------------------------------------------------------------
  fake_token:
    weights:
      identity:
        name: 0.40
        unicode: 0.35
        cip25: 0.25
      distribution:
        recipients: 0.40
        ratio: 0.30
        policy_age: 0.20
        recurrence: 0.10
      overall:
        identity: 0.60
        distribution: 0.40
    fixed_anchors:
      name_sim:       { p50: 0.80,    p99: 0.97 }
      unicode:        { p50: 0.0,     p99: 0.60 }
      cip25:          { p50: 0.0,     p99: 0.80 }
      policy_age_inv: { p50: 0.00001, p99: 0.0002 } # 1/100_000, 1/5_000
    bootstrap_anchors:
      recipient_count:         { p50: 1,   p99: 100 }
      mint_to_recipient_ratio: { p50: 100, p99: 100_000 }
    # Min Levenshtein similarity (after Unicode normalization +
    # confusables fold) to flag a name collision against the legitimate
    # token registry. Lowered from 0.80 to 0.70 to catch single-char
    # intra-Latin substitutions (e.g. lowercase L for uppercase I, as in
    # the INDY homoglyph forge attack) that survive the confusables
    # fold. Trade-off: more 1-char-typo collisions register; FP rate
    # should be measured against real mint traffic and the threshold
    # raised back if benign tokens with one-char distance to legitimate
    # tickers appear frequently.
    similarity_threshold: 0.70
    unicode_scores:                 # cumulative unicode_suspicion score increments
      zero_width: 0.4
      mixed_scripts: 0.3
      homoglyphs: 0.3
    reason_thresholds:
      name: 0.3
      unicode: 0.3
      recipients: 0.5
    # Impersonating a high-value asset is more dangerous than cloning a meme
    # coin: a fake stablecoin redirects DeFi collateral that users trust as
    # worth $1, so an exact-name clone deserves more weight even when its
    # distribution is still small (the attacker may be staging). The plain
    # name axis treats every impersonation equally; this amplifies the
    # identity signal for the curated token names below. multiplier >= 1.0 and
    # the identity score is capped at 1.0, so it can only raise a score, never
    # lower a detection. names must match the registry token names in
    # backend/app/analysis/external.py (currently the stablecoins iUSD/DJED and
    # the Djed reserve coin SHEN); extend as the registry gains USDM/USDA/USDC.
    critical_assets:
      multiplier: 1.8
      names: ["iUSD", "DJED", "SHEN"]
    # ASCII visual lookalikes (spec homoglyph table: O/0, I/l/1). When on,
    # the similarity comparison folds both sides through the lookalike
    # groups so a digit-for-letter forgery ("1NDY") matches the legitimate
    # name at full similarity, and the unicode-suspicion axis gets the
    # homoglyph bump only when the fold STRICTLY increases similarity to
    # the matched name (a name that merely contains digits gains nothing,
    # so legitimately numeric names like MIN100 are unaffected).
    ascii_homoglyphs_enabled: true

  # ------------------------------------------------------------------
  phishing:
    weights:
      content:
        # Social-engineering text in on-chain metadata is the dominant
        # practical signal. Real Cardano protocols rarely push Tier-2
        # urgency/reward language through chain metadata, so a match there
        # is near-specific to phishing. 0.40 for social, 0.30 each for
        # blacklist and brand-mimicry, produces High-band hits on clear
        # phishing without requiring per-protocol baselines.
        blacklist: 0.30
        domain: 0.30
        social: 0.40
      delivery:
        recipients: 0.35
        url_recur: 0.25
        targeting: 0.25
        recurrence: 0.15
      overall:
        content: 0.65
        delivery: 0.35
    fixed_anchors:
      domain_age_inv: { p50: 0.00273972602739726, p99: 0.14285714285714285 } # 1/365, 1/7
      brand_sim:      { p50: 0.0,     p99: 0.85 }
      # Saturate at 2 Tier-2 matches (each worth urgency_increment=0.15,
      # so 2 matches = 0.30 raw). Prior anchor p99=0.60 required 4 matches
      # which is rare — most phishing txs carry 2-3 patterns.
      social_score:   { p50: 0.0,     p99: 0.30 }
      # `targeting` anchors will be wired up when the
      # recipient-to-protocol interaction graph lands (§5.3 is deferred).
    bootstrap_anchors:
      recipient_count: { p50: 1, p99: 50 }
    similarity_suspicious_range:
      lo: 0.5                # domain_similarity below this is noise
      hi: 1.0                # above this is exact match (own brand) — excluded
    social_engineering:
      urgency_increment: 0.15
      urgency_cap: 0.6
      brand_increment: 0.10
      brand_cap: 0.3
      # Stacking bonuses applied to the content sub-score when both a URL
      # and Tier-2 social-engineering text are present in the same metadata.
      # url_combo_bonus fires whenever any URL is present alongside Tier-2
      # text; phishing_tld_bonus stacks on top when the URL also lives in a
      # phishing-prone TLD (.xyz / .top / .click / RFC 2606 reserved).
      # Cardano protocols don't deploy in those TLDs, so the combination is
      # near-specific to phishing.
      url_combo_bonus: 0.25
      phishing_tld_bonus: 0.15
    reason_thresholds:
      blacklist: 0.5
      domain: 0.5
      social: 0.3
      recipients: 0.5
    critical_threshold: 0.60         # content_score above this → severity=Critical
    metadata_labels: ["674", "721"]  # CIP-20 message label, CIP-25 NFT metadata
    # Carrier 3: native-asset names. The dominant in-the-wild Cardano scam
    # delivers the URL in the token name itself (a token literally named
    # "claim-ada.xyz"), mass-airdropped to wallet addresses with no metadata
    # and no datum, so it never enters the other two carriers. Decoded
    # (hex to UTF-8) names from the mint map and output value bundles go
    # through the same URL extraction + PSL validation as metadata text, and
    # feed the social-engineering scan. Names that fail UTF-8 decoding fall
    # back to raw hex, which has no dot and can never match. Kill switch
    # only; thresholds are shared with the other carriers.
    asset_name_carrier:
      enabled: true
    # Minimum length for a decoded datum text span to be kept for URL and
    # social-engineering scanning; shorter spans are CBOR structural noise.
    min_decoded_string_len: 4
