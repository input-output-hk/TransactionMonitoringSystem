# Notification module configuration — the alerting system.
#
# Tracked in git and edited/reviewed like config/detection.yaml. It defines:
#   - which delivery channels are enabled
#   - the band x attack-class trigger matrix
#   - recipient lists, with group aliases and per-rule overrides
#
# SECRETS NEVER LIVE HERE. SMTP credentials come from the SMTP_* env vars; the
# webhook HMAC signing key from WEBHOOK_SIGNING_SECRET. This file carries
# structure only, so it is safe to commit.
#
# Pluggability: adding a channel (e.g. SMS) is a code change — a
# NotificationChannel subclass + one line in app/notifications/registry.py —
# plus a block under `channels` here. Removing a channel is `enabled: false`.

version: 1

# ── Channels ────────────────────────────────────────────────────
channels:
  email:
    enabled: true
    # Global default recipient list (the default for all rules). Plain addresses and
    # `group:<alias>` references (expanded from the `groups` block below).
    recipients:
      - ops@example.com
  webhook:
    enabled: false
    # Default endpoint for webhook deliveries. A per-rule `webhook_url`
    # (see triggers.rules) overrides this for matching alerts.
    default_url: ""
    # The POST body is signed with HMAC-SHA256 and the signature sent as the
    # X-TMS-Signature header. The signing key is the WEBHOOK_SIGNING_SECRET
    # env var (.env), like the other secrets.

# ── Groups ──────────────────────────────────────────────────────
# Named recipient aliases usable in any recipient list as `group:<name>`.
groups:
  soc-team:
    - ops@example.com

# ── Triggers ────────────────────────────────────────────────────
triggers:
  # Per-band defaults, applied when no rule below matches the attack class.
  # Critical and High page immediately on all enabled channels;
  # Moderate and Informational send nothing outbound. (Both bands remain
  # viewable in the dashboard via its severity filter — that is a UI concern,
  # not a notification one.) Disabled channels are skipped at dispatch, so
  # listing `webhook` here is harmless while it is disabled above.
  defaults:
    Critical: [email, webhook]
    High: [email, webhook]
    Moderate: []
    Informational: []
  # Per-class refinements. The last matching rule in file order (same band AND
  # the alert's attack_class listed) overrides the band default. A rule may also
  # override the recipient list (per channel) and the webhook URL.
  #
  # Example (uncomment + adapt):
  #   rules:
  #     - band: High
  #       attack_classes: [token_dust, large_datum, large_value]
  #       channels: [email, webhook]
  #     - band: Critical
  #       attack_classes: [front_running, sandwich]
  #       channels: [email, webhook]
  #       recipients:
  #         email: [group:soc-team, ciso@example.com]
  #       webhook_url: "https://hooks.example.com/tms-critical"
  rules: []

# ── Periodic report ─────────────────────────────────────────────
# A scheduled digest (alerts by band + class, top flagged txs, false-positive
# archive activity) over a trailing window. Reuses the same channels above.
periodic_report:
  enabled: false
  frequency: weekly          # daily | weekly | monthly
  window_days: 7             # trailing window; forced to 1 when frequency=daily
  channels: [email]          # which channels deliver the report
  recipients: []             # report recipients; empty = use the channel's
                             # global `recipients` list above
  attack_classes: all        # `all`, or a subset list of the 9 classes
  min_band: Moderate         # include alerts at/above this band
