# TMS webhook test sink: route a path on the existing TLS server to the local
# receiver (webhook_receiver.py on 127.0.0.1:8001). Paste this `location` block
# INSIDE the server { } that already serves your dashboard host (it reuses that
# cert), then: nginx -t && systemctl reload nginx.
#
# The path is an unguessable token, not auth: this endpoint is a public
# print-and-200 sink, so the token just keeps stray scanners out. For preprod
# test data that is enough; do not route real alerts here.

location /webhook-test-CHANGEME/ {
    # Trailing slashes on both sides strip the prefix, so the receiver sees "/".
    proxy_pass http://127.0.0.1:8001/;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Optional hardening: if the backend egresses from a known address, restrict
    # to it (localhost shown; swap for the backend's source IP / docker gateway).
    # allow 127.0.0.1;
    # deny all;
}
