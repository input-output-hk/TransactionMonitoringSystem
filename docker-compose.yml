# Default JSON-file log rotation for every service: without it Docker's
# json-file driver grows unbounded (audit finding). Applied per-service via
# the x-logging anchor.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:18-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tms_password}
      POSTGRES_DB: ${POSTGRES_DB:-tms_db}
    # Same single-box OOM-competition rationale as the ClickHouse limit:
    # an unbounded Postgres can starve the scorer under memory pressure.
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network

  clickhouse:
    image: clickhouse/clickhouse-server:26.1.3
    container_name: tms-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-tms_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # Without a cap ClickHouse claims most host RAM and OOM-competes with
    # the node + Postgres on a single box (audit finding). Override via
    # CLICKHOUSE_MEM_LIMIT for larger hosts.
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-4g}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: tms-cardano-node
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - cardano-node-db:/data
      - node-ipc:/ipc
    command:
      - run
      - --config
      - /config/config.json
      - --topology
      - /config/topology.json
      - --database-path
      - /data
      - --socket-path
      - /ipc/node.socket
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network
    profiles:
      - ingestion

  ogmios:
    # Pinned per ADR-004 (the parser is tied to the Ogmios v6 schema; a
    # silent :latest major bump could change message shapes under us).
    # Upgrade deliberately alongside the cardano-node pin above, re-running
    # the ADR-004 smoke tests.
    image: cardanosolutions/ogmios:v6.13.0
    container_name: tms-ogmios
    depends_on:
      - cardano-node
    command:
      - --node-socket
      - /ipc/node.socket
      - --node-config
      - /config/config.json
      - --host
      - 0.0.0.0
      - --port
      - "1337"
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - node-ipc:/ipc
    ports:
      - "127.0.0.1:1337:1337"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network
    profiles:
      - ingestion

  # Local SMTP catch-all for magic-link emails. Anything sent to port 1025
  # is captured (never forwarded) and viewable in the web UI at :8025.
  # Customer prod deployments swap this for a real SMTP server via the
  # SMTP_* env vars on the `app` service.
  mailpit:
    image: axllent/mailpit:latest
    container_name: tms-mailpit
    ports:
      - "127.0.0.1:1025:1025"  # SMTP submission
      - "127.0.0.1:8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - tms-network
    # No `profiles:` here — Mailpit is harmless and convenient enough
    # that we want it up by default during `docker compose up`.

  # Application service (optional - can run on host or in Docker)
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Only the Cardano network identifier needs to be baked into the
        # SPA bundle. Browser auth is the session cookie set by the
        # magic-link flow — no key is shipped to the client.
        VITE_NETWORK: ${VITE_NETWORK:-preprod}
    container_name: tms-app
    env_file:
      - .env
      - .env.${TMS_ENV:-preprod}
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tms_password}
      - POSTGRES_DB=${POSTGRES_DB:-tms_db}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-tms_analytics}
      - RAW_STORE_PATH=/data/raw
      - RAW_STORE_ENABLED=${RAW_STORE_ENABLED:-true}
      # Magic-link SMTP defaults — point to the docker-compose mailpit
      # service by hostname. Customer prod overrides via .env or shell.
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@tms.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-TMS}
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
      # Client-IP trust for rate limiting + audit logs. The default path is
      # the append-safe right-most X-Forwarded-For hop, honoured only when
      # the direct peer is inside TRUSTED_PROXY_CIDRS (set via .env).
      # TRUSTED_PROXY_CLIENT_IP_HEADER defaults to EMPTY on purpose: set it
      # to CF-Connecting-IP ONLY when Cloudflare fronts the app. Behind any
      # other proxy that does not strip the header, a client-supplied
      # CF-Connecting-IP would be trusted absolutely (rate-limit bucket
      # rotation, forged audit IPs). Whatever proxy fronts the app MUST
      # strip or overwrite client-supplied CF-Connecting-IP and
      # X-Forwarded-For, and TRUSTED_PROXY_CIDRS should be narrowed to the
      # actual proxy address in production (see .env.example).
      - TRUSTED_PROXY_ENABLED=${TRUSTED_PROXY_ENABLED:-true}
      - TRUSTED_PROXY_HOPS=${TRUSTED_PROXY_HOPS:-1}
      - TRUSTED_PROXY_CLIENT_IP_HEADER=${TRUSTED_PROXY_CLIENT_IP_HEADER:-}
      # No default: production must set the dashboard origin explicitly
      # (the app refuses to start with '*' when API keys are configured).
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
    mem_limit: ${APP_MEM_LIMIT:-2g}
    ports:
      # Bind to loopback only — public exposure happens via Cloudflare Tunnel
      # (or similar) which terminates TLS in front of the app.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - raw_store_data:/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      # mailpit has no healthcheck (the image doesn't ship one), so we
      # settle for `service_started`. This is enough because magic-link
      # sends are failure-tolerant: an SMTP timeout on the first email
      # logs an error and returns 200 silently.
      mailpit:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - tms-network
    profiles:
      - app  # Use 'docker-compose --profile app up' to include this service

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  raw_store_data:
    driver: local
  cardano-node-db:
    driver: local
  node-ipc:
    driver: local

networks:
  tms-network:
    driver: bridge
