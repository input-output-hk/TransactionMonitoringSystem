services:
  postgres:
    image: postgres:18-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tms_password}
      POSTGRES_DB: ${POSTGRES_DB:-tms_db}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms-network

  clickhouse:
    image: clickhouse/clickhouse-server:26.1.3
    container_name: tms-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-tms_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms-network

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: tms-cardano-node
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - cardano-node-db:/data
      - node-ipc:/ipc
    command:
      - run
      - --config
      - /config/config.json
      - --topology
      - /config/topology.json
      - --database-path
      - /data
      - --socket-path
      - /ipc/node.socket
    restart: unless-stopped
    networks:
      - tms-network
    profiles:
      - ingestion

  ogmios:
    image: cardanosolutions/ogmios:latest
    container_name: tms-ogmios
    depends_on:
      - cardano-node
    command:
      - --node-socket
      - /ipc/node.socket
      - --node-config
      - /config/config.json
      - --host
      - 0.0.0.0
      - --port
      - "1337"
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - node-ipc:/ipc
    ports:
      - "127.0.0.1:1337:1337"
    restart: unless-stopped
    networks:
      - tms-network
    profiles:
      - ingestion

  # Application service (optional - can run on host or in Docker)
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tms-app
    environment:
      - CARDANO_NETWORK=${CARDANO_NETWORK:-preprod}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tms_password}
      - POSTGRES_DB=${POSTGRES_DB:-tms_db}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-tms_analytics}
      - RAW_STORE_PATH=/data/raw
      - RAW_STORE_ENABLED=${RAW_STORE_ENABLED:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - raw_store_data:/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - tms-network
    profiles:
      - app  # Use 'docker-compose --profile app up' to include this service

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  raw_store_data:
    driver: local
  cardano-node-db:
    driver: local
  node-ipc:
    driver: local

networks:
  tms-network:
    driver: bridge
