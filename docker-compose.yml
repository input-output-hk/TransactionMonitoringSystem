# Default JSON-file log rotation for every service: without it Docker's
# json-file driver grows unbounded (audit finding). Applied per-service via
# the x-logging anchor.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:18-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tms_password}
      POSTGRES_DB: ${POSTGRES_DB:-tms_db}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network

  clickhouse:
    image: clickhouse/clickhouse-server:26.1.3
    container_name: tms-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-tms_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # Without a cap ClickHouse claims most host RAM and OOM-competes with
    # the node + Postgres on a single box (audit finding). Override via
    # CLICKHOUSE_MEM_LIMIT for larger hosts.
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-4g}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: tms-cardano-node
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - cardano-node-db:/data
      - node-ipc:/ipc
    command:
      - run
      - --config
      - /config/config.json
      - --topology
      - /config/topology.json
      - --database-path
      - /data
      - --socket-path
      - /ipc/node.socket
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network
    profiles:
      - ingestion

  ogmios:
    # Pinned per ADR-004 (the parser is tied to the Ogmios v6 schema; a
    # silent :latest major bump could change message shapes under us).
    # Upgrade deliberately alongside the cardano-node pin above, re-running
    # the ADR-004 smoke tests.
    image: cardanosolutions/ogmios:v6.13.0
    container_name: tms-ogmios
    depends_on:
      - cardano-node
    command:
      - --node-socket
      - /ipc/node.socket
      - --node-config
      - /config/config.json
      - --host
      - 0.0.0.0
      - --port
      - "1337"
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - node-ipc:/ipc
    ports:
      - "127.0.0.1:1337:1337"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tms-network
    profiles:
      - ingestion

  # Application service (optional - can run on host or in Docker)
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Baked into the SPA bundle at build time. Use a single API key
        # for both the backend's API_KEYS allowlist and the frontend's
        # outgoing TMS-API-Key header so they always match.
        VITE_TMS_API_KEY: ${VITE_TMS_API_KEY:-}
        VITE_NETWORK: ${VITE_NETWORK:-preprod}
    container_name: tms-app
    env_file:
      - .env
      - .env.${TMS_ENV:-preprod}
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tms_password}
      - POSTGRES_DB=${POSTGRES_DB:-tms_db}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-tms_analytics}
      - RAW_STORE_PATH=/data/raw
      - RAW_STORE_ENABLED=${RAW_STORE_ENABLED:-true}
    ports:
      # Bind to loopback only — public exposure happens via Cloudflare Tunnel
      # (or similar) which terminates TLS in front of the app.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - raw_store_data:/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - tms-network
    profiles:
      - app  # Use 'docker-compose --profile app up' to include this service

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  raw_store_data:
    driver: local
  cardano-node-db:
    driver: local
  node-ipc:
    driver: local

networks:
  tms-network:
    driver: bridge
