services:
  postgres:
    image: postgres:18-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tms_password}
      POSTGRES_DB: ${POSTGRES_DB:-tms_db}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms-network

  clickhouse:
    image: clickhouse/clickhouse-server:26.1.3
    container_name: tms-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-tms_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms-network

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: tms-cardano-node
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - cardano-node-db:/data
      - node-ipc:/ipc
    command:
      - run
      - --config
      - /config/config.json
      - --topology
      - /config/topology.json
      - --database-path
      - /data
      - --socket-path
      - /ipc/node.socket
    restart: unless-stopped
    networks:
      - tms-network
    profiles:
      - ingestion

  ogmios:
    image: cardanosolutions/ogmios:latest
    container_name: tms-ogmios
    depends_on:
      - cardano-node
    command:
      - --node-socket
      - /ipc/node.socket
      - --node-config
      - /config/config.json
      - --host
      - 0.0.0.0
      - --port
      - "1337"
    volumes:
      - ${CARDANO_CONFIG_DIR:-./cardano-config/preprod}:/config:ro
      - node-ipc:/ipc
    ports:
      - "127.0.0.1:1337:1337"
    restart: unless-stopped
    networks:
      - tms-network
    profiles:
      - ingestion

  # Local SMTP catch-all for magic-link emails. Anything sent to port 1025
  # is captured (never forwarded) and viewable in the web UI at :8025.
  # Customer prod deployments swap this for a real SMTP server via the
  # SMTP_* env vars on the `app` service.
  mailpit:
    image: axllent/mailpit:latest
    container_name: tms-mailpit
    ports:
      - "127.0.0.1:1025:1025"  # SMTP submission
      - "127.0.0.1:8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - tms-network
    # No `profiles:` here — Mailpit is harmless and convenient enough
    # that we want it up by default during `docker compose up`.

  # Application service (optional - can run on host or in Docker)
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Only the Cardano network identifier needs to be baked into the
        # SPA bundle. Browser auth is the session cookie set by the
        # magic-link flow — no key is shipped to the client.
        VITE_NETWORK: ${VITE_NETWORK:-preprod}
    container_name: tms-app
    env_file:
      - .env
      - .env.${TMS_ENV:-preprod}
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tms_password}
      - POSTGRES_DB=${POSTGRES_DB:-tms_db}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-tms_analytics}
      - RAW_STORE_PATH=/data/raw
      - RAW_STORE_ENABLED=${RAW_STORE_ENABLED:-true}
      # Magic-link SMTP defaults — point to the docker-compose mailpit
      # service by hostname. Customer prod overrides via .env or shell.
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@tms.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-TMS}
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
    ports:
      # Bind to loopback only — public exposure happens via Cloudflare Tunnel
      # (or similar) which terminates TLS in front of the app.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - raw_store_data:/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - tms-network
    profiles:
      - app  # Use 'docker-compose --profile app up' to include this service

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  raw_store_data:
    driver: local
  cardano-node-db:
    driver: local
  node-ipc:
    driver: local

networks:
  tms-network:
    driver: bridge
