<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" fill="#0F172A"/>
  
  <!-- Subtle gradient accent -->
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- Analytics bars (transaction visualization) -->
  <rect x="12" y="38" width="6" height="14" rx="1.5" fill="url(#accent)" opacity="0.85"/>
  <rect x="22" y="30" width="6" height="22" rx="1.5" fill="url(#accent)" opacity="0.85"/>
  <rect x="32" y="22" width="6" height="30" rx="1.5" fill="url(#accent)"/>
  <rect x="42" y="34" width="6" height="18" rx="1.5" fill="url(#accent)" opacity="0.85"/>
  
  <!-- TMS text -->
  <text x="32" y="18" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="14" 
        font-weight="800" 
        fill="#F8FAFC" 
        text-anchor="middle" 
        letter-spacing="0.5">TMS</text>
</svg>
